      </feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="44" fill="none" stroke="#ff2d95" stroke-width="2.5" opacity="0.8"/>
  <circle cx="50" cy="50" r="34" fill="none" stroke="#ff6b35" stroke-width="2" opacity="0.75" stroke-dasharray="10 5"/>
  <circle cx="50" cy="50" r="22" fill="none" stroke="#ff2d95" stroke-width="2" opacity="0.85" stroke-dasharray="5 4"/>
  <circle cx="50" cy="50" r="10" fill="none" stroke="#ff6b35" stroke-width="1.8" opacity="0.9"/>
  <circle cx="50" cy="50" r="5" fill="#ff2d95" filter="url(#glow)"/>
</svg>